name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run a simple test
      id: simple-test
      run: |
        cat sca-scanning-example.txt > /tmp/sca-output.txt
        echo "message=SCA scan completed with 35 CVEs" >> "$GITHUB_OUTPUT"

    - name: Microsoft Teams Notification (Custom Action)
      uses: ./.github/actions/custom-teams-action
      if: always()
      with:
        webhook_url: ${{ secrets.MSTEAMS_WEBHOOK }}
        title: 'SCA Scan Result'
        message: ${{ steps.simple-test.outputs.message }}
        details_file: /tmp/sca-output.txt
