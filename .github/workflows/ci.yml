name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Run a simple test
      id: simple-test
      run: |
        cp samples/sample-sca-results.json "${{ runner.temp }}/sca-results.json"

    # - name: Run Prisma Cloud
    #   id: prisma-cloud
    #   uses: bridgecrewio/checkov-action@master
    #   env:
    #     PRISMA_API_URL: https://api.sg.prismacloud.io
    #   with:
    #     api-key: ${{ secrets.BC_API_KEY }}
    #     use-enforcement-rules: true
    #     output-file-path: ${{ runner.temp }}/sca-results.json,
    #     output-format: json

    - name: Microsoft Teams Notification
      uses: ./
      if: always()
      with:
        webhook_url: ${{ secrets.MSTEAMS_WEBHOOK }}
        title: "${{ github.event.repository.name }} - SCA Results"
        json_file: ${{ runner.temp }}/sca-results.json
