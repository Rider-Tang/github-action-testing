name: 'Prisma Cloud / SARIF to Microsoft Teams'
description: 'Send customizable Adaptive Card notifications to Microsoft Teams from GitHub Actions, with rich support for SARIF security findings.'
author: 'cic-itd'

inputs:
  webhook_url:
    description: 'Teams webhook URL from Power Automate "Send webhook alerts to a channel"'
    required: true
  title:
    description: 'Main title text for the Adaptive Card. If omitted when using sarif_file or json_file, a dynamic title is generated from the result count.'
    required: false
    default: ''
  message:
    description: 'Optional short message / summary line shown below the title.'
    required: false
    default: ''
  details:
    description: 'Optional multi-line text (placed in a code block). Ignored when sarif_file or details_file is provided.'
    required: false
    default: ''
  details_file:
    description: 'Path to a file containing multi-line text. Ignored when sarif_file or json_file is provided.'
    required: false
    default: ''
  sarif_file:
    description: 'Path to a SARIF file. When provided, findings are rendered as one FactSet per result (recommended for security scans).'
    required: false
    default: ''
  json_file:
    description: 'Path to a JSON file (Prisma Cloud / Checkov SCA format). When provided and sarif_file is not, findings are rendered as one FactSet per result.'
    required: false
    default: ''
  details_url:
    description: 'Optional URL for the "View Details" button. Falls back to a default URL if not provided.'
    required: false
    default: ''
  max_findings_per_card:
    description: 'Maximum number of findings to include per Adaptive Card. Extra findings are sent in follow-up cards. Set to 0 for unlimited (not recommended for large scans). Default: 40.'
    required: false
    default: '40'

runs:
  using: 'node24'
  main: 'index.js'